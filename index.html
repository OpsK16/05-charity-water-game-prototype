<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charity Water Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main class="game-page">
        <header class="game-header">
            <h1>Charity: Water Maze Challenge</h1>
            <p>Collect all clean water droplets before time runs out. Avoid dirty water!</p>
        </header>

        <section class="hud" aria-label="Game status">
            <div class="hud-item">Level: <span id="levelValue">1</span></div>
            <div class="hud-item">Score: <span id="scoreValue">0</span></div>
            <div class="hud-item">Time: <span id="timeValue">0</span>s</div>
            <div class="hud-item">Clean Left: <span id="cleanLeftValue">0</span></div>
        </section>

        <section class="controls" aria-label="Game controls">
            <button id="startBtn" type="button">Start Game</button>
            <button id="pauseBtn" type="button">Pause</button>
            <button id="restartBtn" type="button">Restart Level</button>
        </section>

        <p id="message" class="message" role="status" aria-live="polite">
            Press Start Game to begin.
        </p>

        <section class="maze-wrap" aria-label="Maze board area">
            <section id="maze" class="maze" aria-label="Maze board"></section>
        </section>

        <section id="victoryScreen" class="victory-screen hidden" aria-label="Victory screen">
            <div class="victory-card">
                <img src="img/cw_logo_horizontal.png" alt="charity: water logo" class="victory-logo">
                <h2 id="victoryTitle">Level Complete!</h2>
                <p id="victoryText">You collected all clean water droplets.</p>
                <p id="factText" class="fact-text">Water fact will appear here.</p>
                <div class="victory-actions">
                    <button id="victoryResetBtn" type="button">Reset Level</button>
                    <button id="victoryNextBtn" type="button">Next Level</button>
                </div>
            </div>
        </section>

        <section class="mobile-controls" aria-label="Touch controls">
            <button class="move-btn" type="button" data-direction="up">Up</button>
            <div class="mobile-middle-row">
                <button class="move-btn" type="button" data-direction="left">Left</button>
                <button class="move-btn" type="button" data-direction="down">Down</button>
                <button class="move-btn" type="button" data-direction="right">Right</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
